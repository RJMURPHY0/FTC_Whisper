name: Build and publish Windows installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Prepare build-time config (no secrets)
        shell: pwsh
        run: Copy-Item "config_default.json" "config.json" -Force

      - name: Build executable
        run: pyinstaller --noconfirm --clean "ftc_whisper.spec"

      - name: Prepare release asset name
        shell: pwsh
        run: |
          Copy-Item "dist\FTC Whisper.exe" "dist\FTC-Whisper.exe" -Force
          Copy-Item "dist\FTC Whisper.exe" "dist\FTC-Whisper-v3.exe" -Force

      - name: Publish latest release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: FTC Whisper Latest
          prerelease: false
          make_latest: true
          files: |
            dist/FTC-Whisper.exe
            dist/FTC-Whisper-v3.exe
          overwrite_files: true
          generate_release_notes: true
          append_body: true
